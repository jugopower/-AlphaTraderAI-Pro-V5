<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#120c08">
<meta name="app-version" content="20260713-1030">
<title>AlphaTrader AI Pro V5｜Build016.4.1 Stable Slider Layout</title>
<style>
:root{
  --bg:#0b0806;--panel:#18100b;--panel2:#24160e;--line:#8a6a3d;
  --gold:#efc45f;--text:#fff7e7;--muted:#c9b696;--danger:#ff5b57;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
button,select,input{font:inherit}
button{touch-action:manipulation}
.app{
  height:100dvh;display:grid;grid-template-columns:260px minmax(0,1fr) 118px;
  grid-template-rows:minmax(0,1fr) 112px;gap:8px;padding:8px;
}
.left,.right,.toolbar,.player,.board-wrap{
  background:linear-gradient(180deg,#1c120c,#100b08);
  border:1px solid #6c4b2c;border-radius:18px;box-shadow:inset 0 1px #ffffff10;
}
.left{grid-column:1;grid-row:1 / span 2;padding:14px;overflow:auto}
.right{grid-column:3;grid-row:1 / span 2;padding:8px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.board-wrap{grid-column:2;grid-row:1;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.player{grid-column:2;grid-row:2;padding:10px;display:grid;grid-template-rows:58px 1fr;gap:8px}
#board{
  display:block;
  width:var(--board-size,720px);
  height:var(--board-size,720px);
  max-width:100%;
  max-height:100%;
  flex:0 0 auto;
  touch-action:none;
  contain:strict;
}
.board-wrap{
  contain:layout paint size;
  overscroll-behavior:none;
}
.player{
  contain:layout paint;
}
.range-row{
  min-height:38px;
}
#moveSlider{
  touch-action:pan-x;
  -webkit-user-select:none;
  user-select:none;
}
.brand{font-weight:900;font-size:18px;margin-bottom:12px;color:var(--gold)}
.card{background:#0d0907;border:1px solid #ffffff10;border-radius:14px;padding:12px;margin-bottom:10px}
.player-name{display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:800}
.stone-dot{width:28px;height:28px;border-radius:50%;box-shadow:inset 0 2px 5px #ffffff30,0 3px 8px #0008}
.black{background:#111}.white{background:#eee}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat{background:#090604;border-radius:12px;padding:10px;text-align:center}
.stat small{display:block;color:var(--muted);margin-bottom:4px}.stat b{font-size:18px}
.tool{
  min-height:72px;border:1px solid #6c4b2c;border-radius:14px;background:#17100c;color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:800
}
.tool span{font-size:22px;color:var(--gold)}
.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.controls button{
  border:1px solid #6c4b2c;border-radius:14px;background:#17100c;color:white;font-size:26px;font-weight:900
}
.controls button.primary{background:linear-gradient(135deg,#ffd970,#e4aa2d);color:#1a1008}
.range-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
input[type=range]{width:100%}
.modal-backdrop{
  position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;padding:20px;z-index:50
}
.modal-backdrop.open{display:flex}
.modal{
  width:min(680px,94vw);max-height:86vh;overflow:auto;background:#1a110c;border:1px solid #76512f;border-radius:20px;
  padding:18px;box-shadow:0 20px 70px #000d
}
.modal h2{margin:0 0 12px}.modal .close{float:right;border:0;background:#2a1b12;color:white;border-radius:12px;width:44px;height:44px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
label{display:grid;gap:6px;color:var(--muted)}
select,input,textarea{background:#090604;color:white;border:1px solid #513722;border-radius:10px;padding:10px}
.action{border:0;border-radius:12px;background:linear-gradient(135deg,#ffd970,#e4aa2d);color:#241407;padding:12px;font-weight:900}
.secondary{border:1px solid #6c4b2c;border-radius:12px;background:#25170f;color:white;padding:12px;font-weight:800}
.toast{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:100;
  background:#1d130d;border:1px solid #efc45f66;border-radius:12px;padding:11px 16px;font-weight:800;transition:.2s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.topbar{display:none}
@media (orientation:portrait),(max-width:900px){
  html,body{overflow:auto}
  .app{
    height:auto;min-height:100dvh;display:grid;grid-template-columns:1fr;
    grid-template-rows:76px minmax(520px,calc(100dvh - 210px)) 118px;
    gap:8px;padding:8px;
  }
  .topbar{
    grid-column:1;grid-row:1;display:grid;grid-template-columns:repeat(7,1fr);gap:5px;
    background:linear-gradient(180deg,#1c120c,#100b08);border:1px solid #6c4b2c;border-radius:18px;padding:6px
  }
  .topbar .tool{min-height:60px;font-size:11px}
  .topbar .tool span{font-size:18px}
  .left,.right{display:none}
  .board-wrap{
    grid-column:1;grid-row:2;
    min-height:520px;
    height:calc(100dvh - 210px);
    max-height:calc(100dvh - 210px);
  }
  .player{grid-column:1;grid-row:3}
}
</style>
</head>
<body>
<div class="app">
  <nav class="topbar" id="topbar"></nav>

  <aside class="left">
    <div class="brand">AlphaTrader AI Pro V5<br><small>Build016.4.1 Stable Slider Layout</small></div>
    <div class="card"><div class="player-name"><span><i class="stone-dot white"></i> 白方</span><b id="whiteName">AI</b></div></div>
    <div class="card"><div class="player-name"><span><i class="stone-dot black"></i> 黑方</span><b id="blackName">人類</b></div></div>
    <div class="stats">
      <div class="stat"><small>目前手數</small><b id="moveCount">0 / 0</b></div>
      <div class="stat"><small>最新落子</small><b id="lastCoord">—</b></div>
      <div class="stat"><small>黑方提子</small><b id="blackCaptures">0</b></div>
      <div class="stat"><small>白方提子</small><b id="whiteCaptures">0</b></div>

      <div class="stat"><small>狀態</small><b id="statusText">待命</b></div><div class="stat"><small>規則引擎</small><b id="engineText">啟動中</b></div><div class="stat"><small>非法節點</small><b id="illegalMoves">0</b></div><div class="stat"><small>最後提子</small><b id="lastCapture">0</b></div><div class="stat"><small>快照</small><b id="snapshotText">0</b></div><div class="stat"><small>累計提子</small><b id="captureTotal">0</b></div><div class="stat"><small>Renderer</small><b id="rendererText">待命</b></div><div class="stat"><small>局面雜湊</small><b id="renderHashText">—</b></div><div class="stat"><small>版面鎖定</small><b id="layoutText">待命</b></div>
    </div>

  <main class="board-wrap"><canvas id="board"></canvas></main>

  <aside class="right" id="rightTools"></aside>

  <section class="player">
    <div class="controls">
      <button id="firstBtn">⏮</button>

    </div>
    <div class="range-row"><input id="moveSlider" type="range" min="0" max="0" value="0"><span id="sliderText">0 / 0</span></div>

<input id="sgfFile" type="file" accept=".sgf,.SGF,application/x-go-sgf,application/octet-stream,text/plain" hidden>

<div id="infoModal" class="modal-backdrop"><div class="modal">

  </div>
  <label style="margin-top:12px">貼上 SGF 文字

  <div class="card"><small>解析狀態</small><p id="parseInfo">等待 SGF。</p></div><div class="card"><small>提子驗證紀錄</small><p id="captureLog">尚未載入棋譜。</p></div>
</div></div>

<div id="aiModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="aiModal">✕</button><h2>AI 分析</h2>
  <div class="card"><b>示範分析</b><p id="aiText">載入棋譜後可查看目前局面的示範評語。</p></div>
  <div class="grid2"><button class="action" id="bestMoveBtn">顯示最佳手</button><button class="secondary" id="explainBtn">AI 解說</button></div>
</div></div>

<div id="humanModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="humanModal">✕</button><h2>人機對弈</h2>
  <div class="grid2">
    <label>棋盤<select id="gameSize"><option>19</option><option>13</option><option>9</option></select></label>
    <label>人類執子<select id="humanColor"><option value="B">黑</option><option value="W">白</option></select></label>
    <label>基本時間（分鐘）<input id="mainTime" type="number" min="0" value="30"></label>
    <label>讀秒（秒）<input id="byoTime" type="number" min="0" value="30"></label>

</div></div>

<div id="cloudModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="cloudModal">✕</button><h2>KataGo Cloud</h2>
  <label>API 網址<input id="apiUrl" placeholder="https://你的-katago-server.example.com"></label>
  <label>API 金鑰<input id="apiKey" placeholder="API_KEY"></label>
  <div class="grid2" style="margin-top:12px"><button class="action" id="saveApiBtn">儲存設定</button><button class="secondary" id="testApiBtn">測試連線</button></div>
  <p id="cloudStatus">尚未連線。</p>
</div></div>

<div id="toast" class="toast"></div>

<script>
"use strict";
const APP_VERSION="20260713-0200";

const $=id=>document.getElementById(id);
const state={
  size:19,moves:[],index:0,playing:false,timer:null,fileName:"",
  humanMode:false,humanColor:"B",turn:"B",sound:true,bestPoint:null,setupB:[],setupW:[],gameInfo:{},blackCaptures:0,whiteCaptures:0,koHash:null,actions:[],replayCache:[],illegalCount:0,lastCapture:0,engineVerified:false,captureEvents:[],currentSnapshot:null,renderedHash:"",rendererVerified:false,boardCssSize:0,sliderRAF:0,isSliderDragging:false
};

function toast(msg){
  const el=$("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1500);
}
function openModal(id){$(id).classList.add("open")}
function closeModal(id){$(id).classList.remove("open")}

const tools=[
  ["infoBtn","☰","資訊",()=>openModal("infoModal")],
  ["teachBtn","▣","教學",()=>toast("教學模式已啟動")],
  ["aiBtn","AI","AI分析",()=>openModal("aiModal")],
  ["humanBtn","♟","人機",()=>openModal("humanModal")],
  ["cloudBtn","◉","KataGo",()=>openModal("cloudModal")],
  ["zoomBtn","⛶","放大",()=>toggleFullscreen()],
  ["resetBtn","↺","還原",()=>resetView()]
];
function buildTools(container){
  container.innerHTML="";
  tools.forEach(([id,icon,label,fn])=>{
    const b=document.createElement("button"); b.id=id+"_"+container.id; b.className="tool";
    b.innerHTML=`<span>${icon}</span><small>${label}</small>`;
    b.addEventListener("click",fn); container.appendChild(b);
  });
}
buildTools($("rightTools")); buildTools($("topbar"));

function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else{ document.exitFullscreen?.(); }
}
function resetView(){
  document.querySelectorAll(".modal-backdrop.open").forEach(x=>x.classList.remove("open"));
  resizeBoard(true); syncUI(); toast("已還原正常版面");
}

function sgfUnescape(value){
  return value.replace(/\\\r?\n/g,"").replace(/\\(.)/g,"$1");
}
function parseSGFProperties(nodeText){
  const props={}; let i=0;
  while(i<nodeText.length){
    while(i<nodeText.length && !/[A-Za-z]/.test(nodeText[i]))i++;
    if(i>=nodeText.length)break;
    let key="";
    while(i<nodeText.length && /[A-Za-z]/.test(nodeText[i]))key+=nodeText[i++];
    key=key.toUpperCase();
    while(i<nodeText.length && /\s/.test(nodeText[i]))i++;
    const values=[];
    while(nodeText[i]==="["){
      i++; let val="";
      while(i<nodeText.length){
        const ch=nodeText[i++];
        if(ch==="\\"){
          if(i<nodeText.length){
            const next=nodeText[i++];
            if(next==="\r" && nodeText[i]==="\n")i++;
            else if(next!=="\n")val+=next;
          }
        }else if(ch==="]"){break}
        else val+=ch;
      }
      values.push(val);
      while(i<nodeText.length && /\s/.test(nodeText[i]))i++;
    }
    if(key && values.length)props[key]=values;
  }
  return props;
}
function extractMainLineNodes(text){
  const start=text.indexOf("(");
  if(start<0)throw new Error("找不到 SGF 棋譜起始符號 (");
  const nodes=[]; let depth=0,inValue=false,escape=false,nodeStart=-1;
  for(let i=start;i<text.length;i++){
    const ch=text[i];
    if(inValue){
      if(escape){escape=false;continue}
      if(ch==="\\"){escape=true;continue}
      if(ch==="]"){inValue=false}
      continue;
    }
    if(ch==="["){inValue=true;continue}
    if(ch==="("){depth++;continue}
    if(ch===")"){
      if(depth===1 && nodeStart>=0){
        nodes.push(text.slice(nodeStart,i));nodeStart=-1;
      }
      depth--;
      if(depth===0)break;
      continue;
    }
    if(depth===1 && ch===";"){
      if(nodeStart>=0)nodes.push(text.slice(nodeStart,i));
      nodeStart=i+1;
    }
  }
  return nodes.filter(Boolean);
}
function sgfCoord(value,size){
  if(value==="" || value==null)return {pass:true};
  if(value.length<2)return {pass:true};
  const x=value.toLowerCase().charCodeAt(0)-97;
  const y=value.toLowerCase().charCodeAt(1)-97;
  if(x<0||y<0||x>=size||y>=size)return {pass:true};
  return {x,y};
}
function parseSGF(text){
  if(typeof text!=="string")throw new Error("SGF 內容不是文字");
  text=text.replace(/^\uFEFF/,"").trim();
  const nodes=extractMainLineNodes(text);
  if(!nodes.length)throw new Error("SGF 中找不到節點");
  const root=parseSGFProperties(nodes[0]);
  const size=Math.max(2,Math.min(52,Number(root.SZ?.[0]||19)));
  const info={
    pb:sgfUnescape(root.PB?.[0]||"黑方"),
    pw:sgfUnescape(root.PW?.[0]||"白方"),
    br:sgfUnescape(root.BR?.[0]||""),
    wr:sgfUnescape(root.WR?.[0]||""),
    result:sgfUnescape(root.RE?.[0]||"—"),
    date:sgfUnescape(root.DT?.[0]||""),
    event:sgfUnescape(root.EV?.[0]||""),
    komi:sgfUnescape(root.KM?.[0]||""),
    handicap:sgfUnescape(root.HA?.[0]||"")
  };
  const setupB=(root.AB||[]).map(v=>sgfCoord(v,size)).filter(p=>!p.pass);
  const setupW=(root.AW||[]).map(v=>sgfCoord(v,size)).filter(p=>!p.pass);
  const moves=[];
  for(const nodeText of nodes){
    const p=parseSGFProperties(nodeText);
    if(p.B){
      const c=sgfCoord(p.B[0],size); moves.push({c:"B",...c,comment:sgfUnescape(p.C?.[0]||"")});
    }else if(p.W){
      const c=sgfCoord(p.W[0],size); moves.push({c:"W",...c,comment:sgfUnescape(p.C?.[0]||"")});
    }
  }
  
  const actions=[];
  for(const nodeText of nodes){
    const p=parseSGFProperties(nodeText);
    const action={addB:[],addW:[],remove:[],move:null,comment:sgfUnescape(p.C?.[0]||"")};
    (p.AB||[]).forEach(v=>{const q=sgfCoord(v,size);if(!q.pass)action.addB.push(q)});
    (p.AW||[]).forEach(v=>{const q=sgfCoord(v,size);if(!q.pass)action.addW.push(q)});
    (p.AE||[]).forEach(v=>{const q=sgfCoord(v,size);if(!q.pass)action.remove.push(q)});
    if(p.B){const q=sgfCoord(p.B[0],size);action.move={c:"B",...q,comment:action.comment}}
    else if(p.W){const q=sgfCoord(p.W[0],size);action.move={c:"W",...q,comment:action.comment}}
    if(action.addB.length||action.addW.length||action.remove.length||action.move)actions.push(action);
  }
  return {size,...info,moves,setupB,setupW,actions,nodes:nodes.length};
}
function loadSGFText(text,name){
  try{
    const g=parseSGF(text);
    state.size=g.size; state.moves=g.moves; state.index=0; state.fileName=name||"SGF";
    state.setupB=g.setupB; state.setupW=g.setupW; state.actions=g.actions||[]; state.gameInfo=g; state.replayCache=[]; state.illegalCount=0;
    state.humanMode=false; state.bestPoint=null;
    $("blackName").textContent=g.pb+(g.br?" "+g.br:"");
    $("whiteName").textContent=g.pw+(g.wr?" "+g.wr:"");
    $("fileInfo").textContent=`已載入：${state.fileName}｜${g.size}路｜${g.moves.length}手`;
    $("parseInfo").textContent=`解析成功：${g.nodes} 個節點，${g.moves.length} 手，黑設定子 ${g.setupB.length}，白設定子 ${g.setupW.length}。Stable Slider Layout 已啟用；拖曳時只更新棋局，不重新計算棋盤尺寸。結果：${g.result}`;
    resizeBoard(true); syncUI(); toast("棋譜完整載入");
    return true;
  }catch(err){
    console.error(err);
    $("fileInfo").textContent="棋譜載入失敗。";
    $("parseInfo").textContent="解析錯誤："+err.message;
    toast("SGF 解析失敗");
    return false;
  }
}

const canvas=$("board"),ctx=canvas.getContext("2d");
function resizeBoard(force=false){
  const wrap=canvas.parentElement;
  const parent=wrap.getBoundingClientRect();
  const availableW=Math.max(280,Math.floor(parent.width-16));
  const availableH=Math.max(280,Math.floor(parent.height-16));
  const css=Math.max(280,Math.floor(Math.min(availableW,availableH)));
  if(!force && Math.abs(css-state.boardCssSize)<2)return false;

  state.boardCssSize=css;
  wrap.style.setProperty("--board-size",css+"px");
  canvas.style.setProperty("--board-size",css+"px");

  const dpr=Math.min(window.devicePixelRatio||1,2);
  const px=Math.floor(css*dpr);
  if(canvas.width!==px||canvas.height!==px){
    canvas.width=px;
    canvas.height=px;
  }
  canvas._cssSize=css;
  canvas._dpr=dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return true;
}
function emptyPosition(size){
  return Array.from({length:size},()=>Array(size).fill(null));
}
function emptyProvenance(size){
  return Array.from({length:size},()=>Array(size).fill(0));
}
function clonePosition(board){
  return board.map(row=>row.slice());
}
function positionHash(board){
  return board.map(row=>row.map(v=>v||".").join("")).join("/");
}
function neighbors(x,y,size){
  const out=[];
  if(x>0)out.push([x-1,y]);
  if(x+1<size)out.push([x+1,y]);
  if(y>0)out.push([x,y-1]);
  if(y+1<size)out.push([x,y+1]);
  return out;
}
function groupAt(board,x,y){
  const color=board[y]?.[x];
  if(!color)return {color:null,stones:[],liberties:new Set()};
  const stack=[[x,y]],seen=new Set(),stones=[],liberties=new Set();
  while(stack.length){
    const [cx,cy]=stack.pop(),key=cx+","+cy;
    if(seen.has(key))continue;
    seen.add(key);stones.push([cx,cy]);
    for(const [nx,ny] of neighbors(cx,cy,board.length)){
      const value=board[ny][nx];
      if(value===null)liberties.add(nx+","+ny);
      else if(value===color&&!seen.has(nx+","+ny))stack.push([nx,ny]);
    }
  }
  return {color,stones,liberties};
}
function removeStones(board,provenance,stones){
  for(const [x,y] of stones){
    board[y][x]=null;
    provenance[y][x]=0;
  }
}
function applySetup(board,provenance,action){
  const next=clonePosition(board),nextProv=clonePosition(provenance);
  for(const p of action.remove||[])if(p&&next[p.y]){next[p.y][p.x]=null;nextProv[p.y][p.x]=0}
  for(const p of action.addB||[])if(p&&next[p.y]){next[p.y][p.x]="B";nextProv[p.y][p.x]=0}
  for(const p of action.addW||[])if(p&&next[p.y]){next[p.y][p.x]="W";nextProv[p.y][p.x]=0}
  return {board:next,provenance:nextProv};
}
function executeMove(board,provenance,move,moveNo,{rejectSuicide=false,koHash=null}={}){
  const original=clonePosition(board),originalProv=clonePosition(provenance);
  if(!move||move.pass){
    return {ok:true,board:original,provenance:originalProv,captured:0,capturedStones:[],hash:positionHash(original),pass:true};
  }
  const {x,y,c}=move;
  if(!Number.isInteger(x)||!Number.isInteger(y)||x<0||y<0||y>=board.length||x>=board.length){
    return {ok:false,error:"落子超出棋盤",board:original,provenance:originalProv,captured:0,capturedStones:[],hash:positionHash(original)};
  }
  if(board[y][x]!==null){
    return {ok:false,error:"重複落子",board:original,provenance:originalProv,captured:0,capturedStones:[],hash:positionHash(original)};
  }

  const next=clonePosition(board),nextProv=clonePosition(provenance);
  next[y][x]=c; nextProv[y][x]=moveNo;
  const opponent=c==="B"?"W":"B";
  const capturedStones=[];
  const processed=new Set();

  for(const [nx,ny] of neighbors(x,y,next.length)){
    if(next[ny][nx]!==opponent)continue;
    const group=groupAt(next,nx,ny);
    const sig=group.stones.map(([sx,sy])=>sx+","+sy).sort().join("|");
    if(processed.has(sig))continue;
    processed.add(sig);
    if(group.liberties.size===0){
      capturedStones.push(...group.stones);
      removeStones(next,nextProv,group.stones);
    }
  }

  const own=groupAt(next,x,y);
  if(own.liberties.size===0){
    if(rejectSuicide){
      return {ok:false,error:"自殺禁手",board:original,provenance:originalProv,captured:0,capturedStones:[],hash:positionHash(original)};
    }
    removeStones(next,nextProv,own.stones);
  }

  const hash=positionHash(next);
  if(koHash&&hash===koHash){
    return {ok:false,error:"打劫：不可立即回提",board:original,provenance:originalProv,captured:0,capturedStones:[],hash:positionHash(original)};
  }
  return {
    ok:true,board:next,provenance:nextProv,
    captured:capturedStones.length,capturedStones,hash,pass:false
  };
}
function normalizedActions(){
  if(state.actions&&state.actions.length)return state.actions;
  return state.moves.map(move=>({addB:[],addW:[],remove:[],move}));
}
function buildReplayCache(){
  let board=emptyPosition(state.size),provenance=emptyProvenance(state.size);
  let blackCaptures=0,whiteCaptures=0,illegal=0,moveNo=0;
  let hashTwoPliesAgo=null;
  const cache=[{
    board:clonePosition(board),provenance:clonePosition(provenance),
    blackCaptures,whiteCaptures,lastCapture:0,hash:positionHash(board)
  }];
  const events=[];

  for(const action of normalizedActions()){
    if((action.addB&&action.addB.length)||(action.addW&&action.addW.length)||(action.remove&&action.remove.length)){
      const setup=applySetup(board,provenance,action);
      board=setup.board;provenance=setup.provenance;
      hashTwoPliesAgo=null;
    }
    if(!action.move)continue;

    moveNo++;
    const beforeHash=positionHash(board);
    const result=executeMove(board,provenance,action.move,moveNo,{
      rejectSuicide:false,koHash:hashTwoPliesAgo
    });
    let lastCapture=0;
    if(result.ok){
      board=result.board;provenance=result.provenance;
      lastCapture=result.captured;
      if(action.move.c==="B")blackCaptures+=result.captured;
      else whiteCaptures+=result.captured;
      if(result.captured){
        events.push({
          move:moveNo,color:action.move.c,count:result.captured,
          stones:result.capturedStones.map(([x,y])=>coordLabel(x,y))
        });
      }
    }else{
      illegal++;
    }
    hashTwoPliesAgo=beforeHash;
    cache[moveNo]={
      board:clonePosition(board),provenance:clonePosition(provenance),
      blackCaptures,whiteCaptures,lastCapture,hash:positionHash(board)
    };
  }

  while(cache.length<state.moves.length+1){
    const last=cache[cache.length-1];
    cache.push({
      board:clonePosition(last.board),provenance:clonePosition(last.provenance),
      blackCaptures:last.blackCaptures,whiteCaptures:last.whiteCaptures,
      lastCapture:0,hash:last.hash
    });
  }
  state.replayCache=cache;
  state.illegalCount=illegal;
  state.captureEvents=events;
}
function getSnapshot(n){
  if(!state.replayCache||state.replayCache.length!==state.moves.length+1)buildReplayCache();
  const idx=Math.max(0,Math.min(state.moves.length,Number(n)||0));
  const snap=state.replayCache[idx]||state.replayCache[state.replayCache.length-1];
  return {
    index:idx,
    board:clonePosition(snap.board),
    provenance:clonePosition(snap.provenance),
    blackCaptures:snap.blackCaptures,
    whiteCaptures:snap.whiteCaptures,
    lastCapture:snap.lastCapture,
    hash:snap.hash||positionHash(snap.board)
  };
}
function positionAtMove(n){
  return getSnapshot(n);
}
function activateSnapshot(n){
  state.currentSnapshot=getSnapshot(n);
  return state.currentSnapshot;
}
function verifyRulesEngine(){
  let b=emptyPosition(5),p=emptyProvenance(5);
  b[1][1]="W";b[0][1]="B";b[1][0]="B";b[1][2]="B";
  let r=executeMove(b,p,{c:"B",x:1,y:2},1,{rejectSuicide:true});
  if(!r.ok||r.captured!==1||r.board[1][1]!==null)return false;

  b=emptyPosition(5);p=emptyProvenance(5);
  b[1][1]="W";b[1][2]="W";
  b[0][1]="B";b[0][2]="B";b[1][0]="B";b[1][3]="B";b[2][1]="B";
  r=executeMove(b,p,{c:"B",x:2,y:2},1,{rejectSuicide:true});
  if(!r.ok||r.captured!==2||r.board[1][1]!==null||r.board[1][2]!==null)return false;

  b=emptyPosition(3);p=emptyProvenance(3);
  b[0][1]="W";b[1][0]="W";b[1][2]="W";b[2][1]="W";
  r=executeMove(b,p,{c:"B",x:1,y:1},1,{rejectSuicide:true});
  if(r.ok)return false;
  return true;
}
function coordLabel(x,y){
  const letters="ABCDEFGHJKLMNOPQRST";
  return (letters[x]||"?")+(state.size-y);
}
function drawBoard(snapshot=state.currentSnapshot||activateSnapshot(state.index)){
  const css=canvas._cssSize||state.boardCssSize;
  if(!css)return;
  const dpr=canvas._dpr||Math.min(window.devicePixelRatio||1,2);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const pad=css*0.055,boardPx=css-pad*2,step=boardPx/(state.size-1);
  const grad=ctx.createLinearGradient(0,0,css,css);
  grad.addColorStop(0,"#f2c46d");grad.addColorStop(1,"#c98231");
  ctx.clearRect(0,0,css,css);ctx.fillStyle=grad;ctx.fillRect(0,0,css,css);
  ctx.strokeStyle="#51351e";ctx.lineWidth=Math.max(1,css/900);
  for(let i=0;i<state.size;i++){
    const p=pad+i*step;
    ctx.beginPath();ctx.moveTo(pad,p);ctx.lineTo(css-pad,p);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p,pad);ctx.lineTo(p,css-pad);ctx.stroke();
  }
  const stars=state.size===19?[3,9,15]:state.size===13?[3,6,9]:[2,4,6];
  ctx.fillStyle="#51351e";
  stars.forEach(y=>stars.forEach(x=>{ctx.beginPath();ctx.arc(pad+x*step,pad+y*step,Math.max(2,step*.07),0,Math.PI*2);ctx.fill()}));

  const board=snapshot.board,provenance=snapshot.provenance;
  const start=Math.max(0,snapshot.index-30);
  for(let y=0;y<state.size;y++)for(let x=0;x<state.size;x++){
    const c=board[y][x];if(!c)continue;
    const cx=pad+x*step,cy=pad+y*step,r=step*.43;
    const g=ctx.createRadialGradient(cx-r*.25,cy-r*.3,r*.08,cx,cy,r);
    if(c==="B"){g.addColorStop(0,"#4a4a4a");g.addColorStop(.35,"#161616");g.addColorStop(1,"#000")}
    else{g.addColorStop(0,"#fff");g.addColorStop(.55,"#eee");g.addColorStop(1,"#bbb")}
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    const moveNumber=provenance[y][x]||0;
    if(moveNumber>start){
      ctx.fillStyle=c==="B"?"#fff":"#222";
      ctx.font=`${Math.max(10,step*.32)}px sans-serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(String(moveNumber),cx,cy);
    }
    if(moveNumber===snapshot.index){
      ctx.strokeStyle="#ff5148";ctx.lineWidth=Math.max(2,step*.07);
      ctx.beginPath();ctx.arc(cx,cy,r*.78,0,Math.PI*2);ctx.stroke();
    }
  }
  if(state.bestPoint){
    const cx=pad+state.bestPoint.x*step,cy=pad+state.bestPoint.y*step;
    ctx.strokeStyle="#38ff85";ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(cx,cy,step*.34,0,Math.PI*2);ctx.stroke();
  }
  state.renderedHash=positionHash(board);
  state.rendererVerified=state.renderedHash===snapshot.hash;
}
function syncUI(){
  const snapshot=activateSnapshot(state.index);
  $("moveSlider").max=state.moves.length;$("moveSlider").value=state.index;
  $("sliderText").textContent=`${state.index} / ${state.moves.length}`;
  $("moveCount").textContent=`${state.index} / ${state.moves.length}`;
  $("boardSizeText").textContent=`${state.size}路`;
  const mv=state.moves[state.index-1];
  $("lastCoord").textContent=mv&&!mv.pass?coordLabel(mv.x,mv.y):"—";
  $("statusText").textContent=state.humanMode?"對弈中":"待命";
  const pos=snapshot;
  state.blackCaptures=pos.blackCaptures;
  state.whiteCaptures=pos.whiteCaptures;
  $("blackCaptures").textContent=state.blackCaptures;
  $("whiteCaptures").textContent=state.whiteCaptures;
  state.lastCapture=pos.lastCapture||0;
  $("lastCapture").textContent=state.lastCapture;
  $("illegalMoves").textContent=state.illegalCount||0;
  $("snapshotText").textContent=state.replayCache?.length||0;
  $("captureTotal").textContent=state.blackCaptures+state.whiteCaptures;
  const events=(state.captureEvents||[]).filter(e=>e.move<=state.index);
  $("captureLog").textContent=events.length
    ? events.slice(-8).map(e=>`第${e.move}手 ${e.color==="B"?"黑":"白"}提${e.count}子：${e.stones.join("、")}`).join("｜")
    : "目前手數以前尚無提子。";
  $("engineText").textContent=state.engineVerified?"規則正常":"待驗證";
  drawBoard(snapshot);
  $("rendererText").textContent=state.rendererVerified?"快照同步":"同步異常";
  $("renderHashText").textContent=(state.renderedHash||"—").slice(0,8);
  $("layoutText").textContent=state.boardCssSize?"已鎖定":"待命";
}
function goTo(n){state.index=Math.max(0,Math.min(state.moves.length,n));syncUI()}
function togglePlay(){
  state.playing=!state.playing;$("playBtn").textContent=state.playing?"⏸":"▶";
  clearInterval(state.timer);
  if(state.playing)state.timer=setInterval(()=>{if(state.index>=state.moves.length){togglePlay();return}goTo(state.index+1)},700);
}

$("firstBtn").onclick=()=>goTo(0);
$("prevBtn").onclick=()=>goTo(state.index-1);
$("playBtn").onclick=togglePlay;
$("nextBtn").onclick=()=>goTo(state.index+1);
$("lastBtn").onclick=()=>goTo(state.moves.length);
const moveSlider=$("moveSlider");
function sliderGoTo(value){
  cancelAnimationFrame(state.sliderRAF);
  const target=Number(value);
  state.sliderRAF=requestAnimationFrame(()=>{
    const sx=window.scrollX,sy=window.scrollY;
    goTo(target);
    if(window.scrollX!==sx||window.scrollY!==sy)window.scrollTo(sx,sy);
  });
}
moveSlider.addEventListener("input",e=>sliderGoTo(e.target.value),{passive:true});
moveSlider.addEventListener("pointerdown",()=>{
  state.isSliderDragging=true;
  document.documentElement.style.scrollBehavior="auto";
},{passive:true});
function endSliderDrag(){
  state.isSliderDragging=false;
  moveSlider.blur();
}
moveSlider.addEventListener("pointerup",endSliderDrag,{passive:true});
moveSlider.addEventListener("pointercancel",endSliderDrag,{passive:true});
moveSlider.addEventListener("change",endSliderDrag,{passive:true});

document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
document.querySelectorAll(".modal-backdrop").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)closeModal(m.id)}));

$("chooseSgfBtn").onclick=()=>$("sgfFile").click();
async function decodeSGFFile(file){
  const buf=await file.arrayBuffer();
  let text=new TextDecoder("utf-8",{fatal:false}).decode(buf);
  const bad=(text.match(/\uFFFD/g)||[]).length;
  if(bad>2){
    try{
      const big5=new TextDecoder("big5",{fatal:false}).decode(buf);
      if((big5.match(/\uFFFD/g)||[]).length<bad)text=big5;
    }catch(e){}
  }
  return text;
}
$("sgfFile").onchange=async e=>{
  const f=e.target.files&&e.target.files[0];if(!f)return;
  $("parseInfo").textContent="正在讀取 "+f.name+"…";
  try{
    const text=await decodeSGFFile(f);
    loadSGFText(text,f.name);
  }catch(err){
    console.error(err);
    $("parseInfo").textContent="檔案讀取失敗："+err.message;
    toast("無法讀取檔案");
  }finally{
    e.target.value="";
  }
};
$("loadPasteBtn").onclick=()=>{
  const text=$("sgfPaste").value.trim();
  if(!text){toast("請先貼上 SGF 文字");return}
  loadSGFText(text,"貼上的 SGF");
};
$("newGameBtn").onclick=()=>{
  state.size=19;state.moves=[];state.index=0;state.fileName="";state.humanMode=false;state.setupB=[];state.setupW=[];state.gameInfo={};state.blackCaptures=0;state.whiteCaptures=0;state.koHash=null;state.actions=[];state.replayCache=[];state.illegalCount=0;state.lastCapture=0;state.captureEvents=[];state.currentSnapshot=null;state.renderedHash="";state.rendererVerified=false;
  $("blackName").textContent="人類";$("whiteName").textContent="AI";$("fileInfo").textContent="空棋盤";$("parseInfo").textContent="已清除棋譜。";
  syncUI();closeModal("infoModal");toast("已建立空棋盤");
};
$("bestMoveBtn").onclick=()=>{
  state.bestPoint={x:Math.floor(state.size/2),y:Math.floor(state.size/2)};
  drawBoard();toast("已顯示示範推薦點");
};
$("explainBtn").onclick=()=>{
  $("aiText").textContent=state.index?"朱老師 AI 建議：先處理弱棋，再考慮全局大場。":"請先載入棋譜或開始對局。";
};
$("startHumanBtn").onclick=()=>{
  state.size=Number($("gameSize").value);state.moves=[];state.index=0;state.setupB=[];state.setupW=[];state.gameInfo={};state.blackCaptures=0;state.whiteCaptures=0;state.koHash=null;state.actions=[];state.replayCache=[];state.illegalCount=0;state.lastCapture=0;state.captureEvents=[];state.currentSnapshot=null;state.renderedHash="";state.rendererVerified=false;state.humanMode=true;state.humanColor=$("humanColor").value;state.turn="B";
  state.sound=$("soundOn").value==="1";$("blackName").textContent=state.humanColor==="B"?"人類":"AI";$("whiteName").textContent=state.humanColor==="W"?"人類":"AI";
  syncUI();closeModal("humanModal");toast("人機對弈已開始");
};
canvas.addEventListener("click",e=>{
  if(!state.humanMode)return;
  const rect=canvas.getBoundingClientRect(),css=rect.width,pad=css*.055,step=(css-pad*2)/(state.size-1);
  const x=Math.round((e.clientX-rect.left-pad)/step),y=Math.round((e.clientY-rect.top-pad)/step);
  if(x<0||y<0||x>=state.size||y>=state.size)return;

  const current=positionAtMove(state.index).board;
  const prev=state.index>0?positionAtMove(state.index-1).board:null;
  const previousHash=prev?positionHash(prev):null;
  const move={c:state.turn,x,y};
  const result=executeMove(current,emptyProvenance(state.size),move,state.index+1,{rejectSuicide:true,koHash:previousHash});
  if(!result.ok){toast(result.error);return}

  state.moves=state.moves.slice(0,state.index);state.actions=[];state.replayCache=[];
  state.moves.push(move);state.index++;
  state.turn=state.turn==="B"?"W":"B";
  syncUI();
  if(state.sound){
    try{
      const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();
      o.frequency.value=result.captured?180:260;g.gain.value=.08;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.06)
    }catch(_){}
  }

  if(state.turn!==state.humanColor){
    setTimeout(()=>{
      const aiCurrent=positionAtMove(state.index).board;
      const aiPrev=state.index>0?positionAtMove(state.index-1).board:null;
      const aiPreviousHash=aiPrev?positionHash(aiPrev):null;
      const pts=[];
      for(let yy=0;yy<state.size;yy++)for(let xx=0;xx<state.size;xx++){
        if(aiCurrent[yy][xx])continue;
        const test=executeMove(aiCurrent,emptyProvenance(state.size),{c:state.turn,x:xx,y:yy},state.index+1,{rejectSuicide:true,koHash:aiPreviousHash});
        if(test.ok)pts.push([xx,yy]);
      }
      if(pts.length){
        const [ax,ay]=pts[Math.floor(Math.random()*pts.length)];
        state.moves.push({c:state.turn,x:ax,y:ay});state.actions=[];state.replayCache=[];state.index++;state.turn=state.turn==="B"?"W":"B";syncUI();
      }
    },350);
  }
});
$("saveApiBtn").onclick=()=>{
  localStorage.setItem("katagoApiUrl",$("apiUrl").value);localStorage.setItem("katagoApiKey",$("apiKey").value);toast("KataGo 設定已儲存");

$("testApiBtn").onclick=()=>{$("cloudStatus").textContent=$("apiUrl").value?"已儲存網址；需部署後端才能真正連線。":"請先填入 API 網址。"};

$("apiKey").value=localStorage.getItem("katagoApiKey")||"";

let layoutTimer=0;
function scheduleLayoutRefresh(delay=160){
  clearTimeout(layoutTimer);
  layoutTimer=setTimeout(()=>{
    if(state.isSliderDragging)return;
    const changed=resizeBoard(false);
    if(changed)drawBoard(state.currentSnapshot||activateSnapshot(state.index));
  },delay);
}
window.addEventListener("resize",()=>scheduleLayoutRefresh(180),{passive:true});
window.addEventListener("orientationchange",()=>scheduleLayoutRefresh(320),{passive:true});
if(window.ResizeObserver){
  const boardObserver=new ResizeObserver(()=>scheduleLayoutRefresh(120));
  boardObserver.observe(canvas.parentElement);
}




function verifySnapshotRenderer(){
  const snap=activateSnapshot(state.index);
  drawBoard(snap);
  return state.renderedHash===snap.hash;
}
state.engineVerified=verifyRulesEngine();
resizeBoard(true);syncUI();
state.rendererVerified=verifySnapshotRenderer();
syncUI();
if(state.engineVerified&&state.rendererVerified){
  $("engineText").textContent="規則正常";
  toast("Build016.4.1 棋盤版面已鎖定");
}else{
  $("engineText").textContent="引擎異常";$("rendererText").textContent="同步異常";
  toast("規則引擎自我測試失敗");
}
