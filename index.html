<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b0806">
<title>AlphaTraderAI Pro V5.0｜Build006 Professional Go Studio</title>
<style>
:root{
  --bg:#0b0806;--panel:#17100b;--panel2:#22170f;--line:#f0c46a3d;
  --text:#fff8e9;--muted:#d8c6aa;--gold:#efc66d;--ok:#76dd9e;--danger:#ff6b63;
  --safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.studio{
  width:100%;height:100dvh;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  gap:6px;
  padding:calc(var(--safe-top) + 6px) calc(var(--safe-right) + 6px) calc(var(--safe-bottom) + 6px) calc(var(--safe-left) + 6px);
}
.topbar{
  min-height:54px;
  display:grid;
  grid-template-columns:minmax(180px,1fr) auto;
  align-items:center;
  gap:8px;
  padding:6px 8px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#17100bef;
  box-shadow:0 8px 28px #0008;
}
.identity{min-width:0;text-align:left}
.identity strong,.identity span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.identity strong{font-size:17px}
.identity span{font-size:12px;color:var(--gold);margin-top:2px}
.toolbar{display:flex;gap:5px;justify-content:center;overflow-x:auto}
.toolbar button{
  width:58px;min-width:58px;height:42px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  border:1px solid #ffffff18;border-radius:10px;background:#ffffff0c;color:#fff;font-weight:800
}
.toolbar button span{font-size:16px;line-height:17px}
.toolbar button small{font-size:10px;line-height:11px;color:#f3dfbd}
.main{min-height:0;display:grid}
.boardShell{
  min-height:0;display:grid;place-items:center;
  border:1px solid var(--line);border-radius:18px;background:#100b07;overflow:hidden;
}
.boardStage{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:4px}
#goBoard{display:block;max-width:100%;max-height:100%}
.bottom{
  display:grid;grid-template-rows:auto auto;gap:4px;
  padding:4px;border:1px solid var(--line);border-radius:16px;background:#17100bef
}
.controls{display:grid;grid-template-columns:repeat(5,minmax(54px,1fr));gap:4px}
.controls button{
  height:42px;border:1px solid #ffffff18;border-radius:10px;background:#211810;color:#fff;
  font-size:20px;font-weight:900
}
#playBtn{background:linear-gradient(145deg,#f8d77f,#dfaa41);color:#201307}
.timeline{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
#moveRange{width:100%;accent-color:#e8b74c}
#counter{min-width:88px;text-align:right;font-size:15px}
.drawerBackdrop{display:none;position:fixed;inset:0;background:#0008;z-index:50}
.drawer{
  position:fixed;z-index:60;
  top:calc(var(--safe-top) + 8px);right:calc(var(--safe-right) + 8px);
  bottom:calc(var(--safe-bottom) + 8px);width:min(430px,94vw);
  transform:translateX(calc(100% + 24px));transition:transform .18s ease;
  background:#17100bf7;border:1px solid var(--line);border-radius:18px;
  box-shadow:0 18px 50px #000c;overflow:auto;padding:52px 12px 18px
}
body.drawer-open .drawer{transform:translateX(0)}
body.drawer-open .drawerBackdrop{display:block}
.drawerClose{position:absolute;right:10px;top:10px;width:36px;height:36px;border-radius:10px;border:1px solid #ffffff18;background:#ffffff0c;color:#fff}
.section{background:#22170f;border:1px solid #ffffff10;border-radius:14px;padding:12px;margin-bottom:10px}
.section h3{margin:0 0 10px;font-size:18px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
.row label{min-width:88px;color:var(--muted)}
.row input,.row select,.row textarea{flex:1;min-width:0;background:#0d0906;color:#fff;border:1px solid #ffffff18;border-radius:9px;padding:9px}
.row textarea{min-height:110px;resize:vertical}
.action{border:0;border-radius:10px;background:linear-gradient(145deg,#f7d47c,#dda73e);color:#211407;font-weight:900;padding:10px 12px}
.secondary{background:#ffffff0d;color:#fff;border:1px solid #ffffff18}
.fileActions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.status{white-space:pre-wrap;background:#332311;color:var(--gold);padding:10px;border-radius:10px;line-height:1.45}
.metaGrid{display:grid;grid-template-columns:auto 1fr;gap:7px 10px;font-size:14px}
.metaGrid span:nth-child(odd){color:var(--muted)}
#debugLog{white-space:pre-wrap;background:#080604;padding:10px;border-radius:10px;max-height:180px;overflow:auto;font:12px/1.45 ui-monospace,monospace}
.mode-minimal .identity{display:none}
.mode-minimal .topbar{grid-template-columns:auto;justify-content:center}
.mode-minimal .toolbar button[data-optional="1"]{display:none}
.mode-teaching .advanced{display:none}
.board-focus .topbar{display:none}
.board-focus .studio{grid-template-rows:minmax(0,1fr) auto;padding-top:calc(var(--safe-top) + 3px)}
.board-focus .boardShell{border-radius:0}
@media (orientation:landscape){
  .topbar{min-height:44px;padding:4px 6px}
  .toolbar button{width:52px;min-width:52px;height:34px}
  .toolbar button span{font-size:14px}
  .toolbar button small{font-size:9px}
  .controls button{height:38px}
}
@media (max-width:820px){
  .topbar{grid-template-columns:1fr}
  .identity{text-align:center}
  .toolbar{justify-content:center}
}
</style>
</head>
<body class="mode-teaching">
<div class="studio">
  <header class="topbar">
    <div class="identity">
      <strong id="gameName">內建範例棋譜</strong>
      <span id="gameSummary">19 路｜0 / 10</span>
    </div>
    <nav class="toolbar">
      <button id="infoBtn"><span>☰</span><small>資訊</small></button>
      <button id="minimalBtn"><span>◫</span><small>極簡</small></button>
      <button id="teachingBtn"><span>📖</span><small>教學</small></button>
      <button id="professionalBtn"><span>⚙</span><small>專業</small></button>
      <button id="focusBtn"><span>⛶</span><small>全螢幕</small></button>
      <button id="restoreBtn"><span>↺</span><small>還原</small></button>
    </nav>
  </header>

  <main class="main">
    <section class="boardShell">
      <div class="boardStage" id="boardStage"><canvas id="goBoard"></canvas></div>
    </section>
  </main>

  <footer class="bottom">
    <div class="controls">
      <button id="firstBtn">⏮</button>
      <button id="prevBtn">◀</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">▶</button>
      <button id="lastBtn">⏭</button>
    </div>
    <div class="timeline">
      <input id="moveRange" type="range" min="0" max="10" value="0">
      <div id="counter">0 / 10</div>
    </div>
  </footer>
</div>

<div id="drawerBackdrop" class="drawerBackdrop"></div>
<aside id="drawer" class="drawer" aria-hidden="true">
  <button id="drawerCloseBtn" class="drawerClose">✕</button>

  <section class="section">
    <h3>SGF 檔案</h3>
    <input id="sgfFile" type="file" hidden>
    <div class="fileActions">
      <button class="action" id="chooseFileBtn">選擇 SGF</button>
      <button class="action secondary" id="readAgainBtn">重新讀取</button>
    </div>
    <div id="selectedFile" class="status" style="margin-top:10px">尚未選擇檔案。</div>
  </section>

  <section class="section advanced">
    <h3>貼上 SGF 文字</h3>
    <div class="row"><textarea id="sgfText" placeholder="貼上完整 SGF，例如 (;GM[1]FF[4]SZ[19]...)"></textarea></div>
    <button class="action" id="loadTextBtn">載入貼上的 SGF</button>
  </section>

  <section class="section">
    <h3>顯示設定</h3>
    <div class="row"><label>手順</label>
      <select id="numberMode">
        <option value="all">全部</option>
        <option value="none">不顯示</option>
        <option value="10">最近 10 手</option>
        <option value="20">最近 20 手</option>
        <option value="30" selected>最近 30 手</option>
        <option value="50">最近 50 手</option>
        <option value="100">最近 100 手</option>
      </select>
    </div>
    <div class="row"><label>最新一手紅圈</label><input id="showLast" type="checkbox" checked></div>
    <div class="row"><label>棋子大小</label>
      <select id="stoneScale"><option value="0.38">小</option><option value="0.42" selected>標準</option><option value="0.46">大</option></select>
    </div>
    <div class="row"><label>播放速度</label>
      <select id="speed"><option value="1200">慢</option><option value="700" selected>標準</option><option value="350">快</option></select>
    </div>
  </section>

  <section class="section advanced">
    <h3>棋譜資訊</h3>
    <div class="metaGrid">
      <span>黑方</span><span id="pb">—</span>
      <span>白方</span><span id="pw">—</span>
      <span>結果</span><span id="re">—</span>
      <span>日期</span><span id="dt">—</span>
      <span>賽事</span><span id="ev">—</span>
      <span>貼目</span><span id="km">—</span>
      <span>讓子</span><span id="ha">0</span>
      <span>總手數</span><span id="totalMoves">10</span>
    </div>
  </section>

  <section class="section">
    <h3>本手註解</h3>
    <div id="comment" class="status">棋譜起始位置。</div>
  </section>

  <section class="section advanced">
    <h3>系統訊息</h3>
    <div id="status" class="status">Build006 Professional Go Studio 已啟動。</div>
  </section>

  <section class="section advanced">
    <h3>讀檔紀錄</h3>
    <div id="debugLog">Build006 Professional Go Studio 已啟動。</div>
  </section>
</aside>

<script>
(function(){
"use strict";
function id(n){return document.getElementById(n)}
function log(s){var e=id("debugLog");e.textContent+=(e.textContent?"\n":"")+s;e.scrollTop=e.scrollHeight}
function status(s,bad){id("status").style.color=bad?"var(--danger)":"var(--gold)";id("status").textContent=s}
var SAMPLE={size:19,meta:{pb:"朱老師",pw:"AI 示範棋手",re:"B+R",dt:"2026-07-12",ev:"Build006 範例棋譜",km:"6.5",ha:"0"},setup:[],moves:[
{c:1,x:15,y:3,comment:"黑棋右上角小目"},{c:-1,x:3,y:3,comment:"白棋左上角小目"},
{c:1,x:16,y:15,comment:"黑棋右下角"},{c:-1,x:3,y:16,comment:"白棋左下角"},
{c:1,x:5,y:2,comment:"黑棋拆邊"},{c:-1,x:2,y:5,comment:"白棋掛角"},
{c:1,x:16,y:5,comment:"黑棋右邊"},{c:-1,x:13,y:2,comment:"白棋右上方"},
{c:1,x:14,y:2,comment:"黑棋接近"},{c:-1,x:13,y:3,comment:"白棋應對"}]};
function decode(buffer){
 var b=new Uint8Array(buffer);
 if(b.length>1&&b[0]===255&&b[1]===254)return new TextDecoder("utf-16le").decode(buffer);
 if(b.length>1&&b[0]===254&&b[1]===255)return new TextDecoder("utf-16be").decode(buffer);
 var u8=new TextDecoder("utf-8",{fatal:false}).decode(buffer);
 if(u8.indexOf("(;")>=0)return u8;
 try{var u16=new TextDecoder("utf-16le",{fatal:false}).decode(buffer);if(u16.indexOf("(;")>=0)return u16}catch(e){}
 return u8;
}
function unesc(v){return v.replace(/\\\r?\n/g,"").replace(/\\\]/g,"]").replace(/\\\\/g,"\\")}
function node(text,i){
 var p={};
 while(i<text.length){
  while(/\s/.test(text[i]||""))i++;
  if(text[i]===";"||text[i]==="("||text[i]===")")break;
  var k="";while(/[A-Z]/.test(text[i]||""))k+=text[i++];
  if(!k){i++;continue}
  var a=[];
  while(true){
   while(/\s/.test(text[i]||""))i++;
   if(text[i]!=="[")break;i++;
   var v="",esc=false;
   while(i<text.length){var ch=text[i++];if(esc){v+=ch;esc=false;continue}if(ch==="\\"){esc=true;continue}if(ch==="]")break;v+=ch}
   a.push(unesc(v));
  }
  p[k]=a;
 }
 return{p:p,i:i};
}
function tree(text,i){
 if(text[i]!=="(")throw Error("SGF 樹狀結構錯誤");
 i++;var seq=[],children=[];
 while(i<text.length){
  while(/\s/.test(text[i]||""))i++;
  if(text[i]===";"){var n=node(text,i+1);seq.push(n.p);i=n.i;continue}
  if(text[i]==="("){var c=tree(text,i);children.push(c.t);i=c.i;continue}
  if(text[i]===")"){i++;break}i++;
 }
 return{t:{seq:seq,children:children},i:i};
}
function first(p,k,d){return p[k]&&p[k].length?p[k][0]:d}
function xy(v){return !v||v.length<2?{pass:true,x:-1,y:-1}:{pass:false,x:v.charCodeAt(0)-97,y:v.charCodeAt(1)-97}}
function mainline(t){var a=t.seq.slice(),c=t;while(c.children.length){c=c.children[0];a=a.concat(c.seq)}return a}
function parseSGF(text){
 text=String(text||"").replace(/^\uFEFF/,"").trim();
 var start=text.indexOf("(");if(start<0||text.indexOf("(;",start)<0)throw Error("這不是有效的 SGF");
 var ns=mainline(tree(text,start).t);if(!ns.length)throw Error("找不到 SGF 節點");
 var root=ns[0],size=parseInt(first(root,"SZ","19"),10);if([9,13,19].indexOf(size)<0)throw Error("目前只支援 9、13、19 路");
 var g={size:size,meta:{pb:first(root,"PB","—"),pw:first(root,"PW","—"),re:first(root,"RE","—"),dt:first(root,"DT","—"),ev:first(root,"EV",first(root,"GN","—")),km:first(root,"KM","—"),ha:first(root,"HA","0")},setup:[],moves:[]};
 (root.AB||[]).forEach(function(v){var p=xy(v);g.setup.push({c:1,pass:p.pass,x:p.x,y:p.y})});
 (root.AW||[]).forEach(function(v){var p=xy(v);g.setup.push({c:-1,pass:p.pass,x:p.x,y:p.y})});
 ns.forEach(function(n){var m;if(n.B&&n.B.length){m=xy(n.B[0]);g.moves.push({c:1,pass:m.pass,x:m.x,y:m.y,comment:first(n,"C","")})}else if(n.W&&n.W.length){m=xy(n.W[0]);g.moves.push({c:-1,pass:m.pass,x:m.x,y:m.y,comment:first(n,"C","")})}});
 return g;
}
function looksLikeSGF(text){var s=String(text||"").replace(/^\uFEFF/,"").trim();return !!s&&s.indexOf("(;")>=0&&/(?:GM|FF|SZ|B|W|AB|AW)\s*\[/.test(s)}
function Board(canvas){
 this.canvas=canvas;this.ctx=canvas.getContext("2d");this.size=19;this.grid=this.empty(19);this.last=null;this.width=0;
 this.resize=this.resize.bind(this);this.queueResize=this.queueResize.bind(this);
 window.addEventListener("resize",this.queueResize);window.addEventListener("orientationchange",this.queueResize);
 if(window.visualViewport)window.visualViewport.addEventListener("resize",this.queueResize);
}
Board.prototype.empty=function(n){var a=[];for(var y=0;y<n;y++)a.push(new Array(n).fill(null));return a};
Board.prototype.inside=function(x,y){return x>=0&&y>=0&&x<this.size&&y<this.size};
Board.prototype.nei=function(x,y){var a=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]],r=[];for(var i=0;i<a.length;i++)if(this.inside(a[i][0],a[i][1]))r.push(a[i]);return r};
Board.prototype.group=function(x,y){var s=this.grid[y][x],st=[[x,y]],seen={},grp=[],lib={};while(st.length){var p=st.pop(),k=p[0]+","+p[1];if(seen[k])continue;seen[k]=1;grp.push(p);var n=this.nei(p[0],p[1]);for(var i=0;i<n.length;i++){var q=this.grid[n[i][1]][n[i][0]];if(!q)lib[n[i][0]+","+n[i][1]]=1;else if(q.c===s.c&&!seen[n[i][0]+","+n[i][1]])st.push(n[i])}}return{group:grp,lib:lib}};
Board.prototype.apply=function(m,num){if(!m||m.pass||!this.inside(m.x,m.y)){this.last=null;return}this.grid[m.y][m.x]={c:m.c,n:num};var n=this.nei(m.x,m.y);for(var i=0;i<n.length;i++){var q=this.grid[n[i][1]][n[i][0]];if(q&&q.c===-m.c){var r=this.group(n[i][0],n[i][1]);if(!Object.keys(r.lib).length)for(var j=0;j<r.group.length;j++)this.grid[r.group[j][1]][r.group[j][0]]=null}}this.last={x:m.x,y:m.y}};
Board.prototype.position=function(g,k){this.size=g.size;this.grid=this.empty(g.size);this.last=null;g.setup.forEach(function(s){if(!s.pass&&this.inside(s.x,s.y))this.grid[s.y][s.x]={c:s.c,n:null}},this);for(var i=0;i<k;i++)this.apply(g.moves[i],i+1);this.draw()};
Board.prototype.queueResize=function(){clearTimeout(this._timer);this._timer=setTimeout(this.resize,100)};
Board.prototype.resize=function(){
 var rect=id("boardStage").getBoundingClientRect();
 var w=Math.max(220,Math.floor(Math.min(rect.width,rect.height)*.99));
 var d=Math.max(1,window.devicePixelRatio||1);
 this.canvas.style.width=w+"px";this.canvas.style.height=w+"px";this.canvas.width=Math.round(w*d);this.canvas.height=Math.round(w*d);
 this.ctx.setTransform(d,0,0,d,0,0);this.dpr=d;this.width=w;this.draw();
};
Board.prototype.draw=function(){
 if(!this.width)return;var c=this.ctx,d=this.dpr||1,snap=function(v){return Math.round(v*d)/d};
 var outerPad=Math.max(14,this.width*.043),boardPixel=this.width-outerPad*2;
 var min=snap((this.width-boardPixel)/2),max=snap(min+boardPixel),cell=boardPixel/(this.size-1);
 var wood=c.createLinearGradient(0,0,this.width,this.width);wood.addColorStop(0,"#efc57d");wood.addColorStop(.5,"#dca253");wood.addColorStop(1,"#bd7731");
 c.fillStyle=wood;c.fillRect(0,0,this.width,this.width);c.strokeStyle="#3e2a17";c.lineWidth=Math.max(1,this.width/720);
 for(var i=0;i<this.size;i++){var p=snap(min+i*cell);c.beginPath();c.moveTo(min,p);c.lineTo(max,p);c.stroke();c.beginPath();c.moveTo(p,min);c.lineTo(p,max);c.stroke()}
 var st=this.size===9?[2,4,6]:this.size===13?[3,6,9]:[3,9,15];c.fillStyle="#332110";
 for(i=0;i<st.length;i++)for(var j=0;j<st.length;j++){if(this.size===9&&(st[i]===4||st[j]===4)&&!(st[i]===4&&st[j]===4))continue;c.beginPath();c.arc(snap(min+st[i]*cell),snap(min+st[j]*cell),Math.max(2.5,cell*.075),0,Math.PI*2);c.fill()}
 var scale=parseFloat(id("stoneScale").value||"0.42"),r=cell*scale;
 for(var y=0;y<this.size;y++)for(var x=0;x<this.size;x++){var s=this.grid[y]&&this.grid[y][x];if(!s)continue;var cx=snap(min+x*cell),cy=snap(min+y*cell),gr=c.createRadialGradient(cx-r*.32,cy-r*.36,r*.05,cx,cy,r);c.save();c.shadowColor="#0007";c.shadowBlur=r*.3;c.shadowOffsetX=r*.12;c.shadowOffsetY=r*.15;if(s.c===1){gr.addColorStop(0,"#737373");gr.addColorStop(.25,"#242424");gr.addColorStop(.72,"#080808");gr.addColorStop(1,"#000")}else{gr.addColorStop(0,"#fff");gr.addColorStop(.48,"#f7f1e7");gr.addColorStop(.82,"#d7d0c5");gr.addColorStop(1,"#aaa297")}c.fillStyle=gr;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();c.restore();
  if(s.n!==null){var mode=id("numberMode").value,show=mode!=="none";if(show&&mode!=="all"){var count=parseInt(mode,10);var cutoff=Math.max(1,index-count+1);show=s.n>=cutoff}if(show){c.fillStyle=s.c===1?"#fff":"#25180c";var digits=String(s.n).length,factor=digits>=3?.48:digits===2?.60:.72;c.font="800 "+Math.max(9,r*factor)+"px sans-serif";c.textAlign="center";c.textBaseline="middle";c.fillText(String(s.n),cx,cy)}}}
 if(id("showLast").checked&&this.last){c.strokeStyle="#ff3b30";c.lineWidth=Math.max(2.5,r*.12);c.beginPath();c.arc(snap(min+this.last.x*cell),snap(min+this.last.y*cell),r*.76,0,Math.PI*2);c.stroke()}
};
var board=new Board(id("goBoard")),game=SAMPLE,index=0,timer=null,currentFile=null,currentGameName="內建範例棋譜";
function updateMeta(){["pb","pw","re","dt","ev","km","ha"].forEach(function(k){id(k).textContent=game.meta[k]});id("totalMoves").textContent=game.moves.length}
function render(){
 board.position(game,index);id("moveRange").max=game.moves.length;id("moveRange").value=index;
 id("counter").textContent=index+" / "+game.moves.length;id("gameName").textContent=currentGameName;
 id("gameSummary").textContent=game.size+" 路｜"+index+" / "+game.moves.length;
 id("comment").textContent=index?(game.moves[index-1].comment||"本手沒有註解。"):"棋譜起始位置。";
}
function stop(){if(timer)clearInterval(timer);timer=null;id("playBtn").textContent="▶"}
function load(g,name){stop();game=g;index=0;currentGameName=name;updateMeta();render();status("已載入："+name+"\n棋盤："+g.size+" 路｜總手數："+g.moves.length,false);log("解析成功："+g.moves.length+" 手｜"+name)}
function read(file){
 if(!file){status("未取得檔案。",true);return}
 currentFile=file;id("selectedFile").textContent="已選擇："+file.name+"（"+file.size+" bytes）";
 var fr=new FileReader();fr.onload=function(){try{var decoded=decode(fr.result);if(!looksLikeSGF(decoded))throw Error("檔案內容不是可辨識的 SGF");load(parseSGF(decoded),file.name)}catch(e){status("載入失敗："+e.message,true);log("錯誤："+e.message)}};fr.onerror=function(){status("檔案讀取失敗。",true)};fr.readAsArrayBuffer(file);
}
function setMode(mode){document.body.classList.remove("mode-minimal","mode-teaching","mode-professional");document.body.classList.add("mode-"+mode);try{localStorage.setItem("goMode",mode)}catch(e){};setTimeout(board.resize,60)}
function openDrawer(){document.body.classList.add("drawer-open");id("drawer").setAttribute("aria-hidden","false")}
function closeDrawer(){document.body.classList.remove("drawer-open");id("drawer").setAttribute("aria-hidden","true")}
function restoreLayout(){closeDrawer();document.body.classList.remove("board-focus");setMode("teaching");stop();requestAnimationFrame(function(){board.resize();render()})}
id("infoBtn").onclick=openDrawer;id("drawerCloseBtn").onclick=closeDrawer;id("drawerBackdrop").onclick=closeDrawer;
id("minimalBtn").onclick=function(){setMode("minimal")};id("teachingBtn").onclick=function(){setMode("teaching")};id("professionalBtn").onclick=function(){setMode("professional")};
id("focusBtn").onclick=function(){document.body.classList.toggle("board-focus");setTimeout(board.resize,60)};id("restoreBtn").onclick=restoreLayout;
id("chooseFileBtn").onclick=function(){id("sgfFile").value="";id("sgfFile").click()};
id("sgfFile").onchange=function(e){var f=e.target.files&&e.target.files[0];if(f)read(f)};
id("readAgainBtn").onclick=function(){if(currentFile)read(currentFile);else status("尚未選擇棋譜。",true)};
id("loadTextBtn").onclick=function(){try{load(parseSGF(id("sgfText").value),"貼上的 SGF")}catch(e){status("載入失敗："+e.message,true)}};
id("firstBtn").onclick=function(){stop();index=0;render()};id("prevBtn").onclick=function(){stop();index=Math.max(0,index-1);render()};
id("nextBtn").onclick=function(){stop();index=Math.min(game.moves.length,index+1);render()};id("lastBtn").onclick=function(){stop();index=game.moves.length;render()};
id("playBtn").onclick=function(){if(timer){stop();return}if(index>=game.moves.length)index=0;id("playBtn").textContent="⏸";timer=setInterval(function(){if(index>=game.moves.length){stop();return}index++;render()},parseInt(id("speed").value,10))};
id("moveRange").oninput=function(){stop();index=parseInt(this.value,10);render()};id("numberMode").onchange=render;id("showLast").onchange=render;id("stoneScale").onchange=render;
new ResizeObserver(function(){board.queueResize()}).observe(id("boardStage"));
var saved="teaching";try{saved=localStorage.getItem("goMode")||"teaching"}catch(e){};if(["minimal","teaching","professional"].indexOf(saved)<0)saved="teaching";
setMode(saved);updateMeta();render();setTimeout(board.resize,80);
})();
</script>
</body>
</html>
