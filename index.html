<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#120c08">
<meta name="app-version" content="20260712-2345">
<title>AlphaTrader AI Pro V5｜Build015 Ultimate Go Studio</title>
<style>
:root{
  --bg:#0b0806;--panel:#18100b;--panel2:#24160e;--line:#8a6a3d;
  --gold:#efc45f;--text:#fff7e7;--muted:#c9b696;--danger:#ff5b57;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
button,select,input{font:inherit}
button{touch-action:manipulation}
.app{
  height:100dvh;display:grid;grid-template-columns:260px minmax(0,1fr) 118px;
  grid-template-rows:minmax(0,1fr) 112px;gap:8px;padding:8px;
}
.left,.right,.toolbar,.player,.board-wrap{
  background:linear-gradient(180deg,#1c120c,#100b08);
  border:1px solid #6c4b2c;border-radius:18px;box-shadow:inset 0 1px #ffffff10;
}
.left{grid-column:1;grid-row:1 / span 2;padding:14px;overflow:auto}
.right{grid-column:3;grid-row:1 / span 2;padding:8px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.board-wrap{grid-column:2;grid-row:1;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.player{grid-column:2;grid-row:2;padding:10px;display:grid;grid-template-rows:58px 1fr;gap:8px}
#board{display:block;max-width:100%;max-height:100%;width:auto;height:auto;touch-action:none}
.brand{font-weight:900;font-size:18px;margin-bottom:12px;color:var(--gold)}
.card{background:#0d0907;border:1px solid #ffffff10;border-radius:14px;padding:12px;margin-bottom:10px}
.player-name{display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:800}
.stone-dot{width:28px;height:28px;border-radius:50%;box-shadow:inset 0 2px 5px #ffffff30,0 3px 8px #0008}
.black{background:#111}.white{background:#eee}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat{background:#090604;border-radius:12px;padding:10px;text-align:center}
.stat small{display:block;color:var(--muted);margin-bottom:4px}.stat b{font-size:18px}
.tool{
  min-height:72px;border:1px solid #6c4b2c;border-radius:14px;background:#17100c;color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:800
}
.tool span{font-size:22px;color:var(--gold)}
.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.controls button{
  border:1px solid #6c4b2c;border-radius:14px;background:#17100c;color:white;font-size:26px;font-weight:900
}
.controls button.primary{background:linear-gradient(135deg,#ffd970,#e4aa2d);color:#1a1008}
.range-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
input[type=range]{width:100%}
.modal-backdrop{
  position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;padding:20px;z-index:50
}
.modal-backdrop.open{display:flex}
.modal{
  width:min(680px,94vw);max-height:86vh;overflow:auto;background:#1a110c;border:1px solid #76512f;border-radius:20px;
  padding:18px;box-shadow:0 20px 70px #000d
}
.modal h2{margin:0 0 12px}.modal .close{float:right;border:0;background:#2a1b12;color:white;border-radius:12px;width:44px;height:44px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
label{display:grid;gap:6px;color:var(--muted)}
select,input,textarea{background:#090604;color:white;border:1px solid #513722;border-radius:10px;padding:10px}
.action{border:0;border-radius:12px;background:linear-gradient(135deg,#ffd970,#e4aa2d);color:#241407;padding:12px;font-weight:900}
.secondary{border:1px solid #6c4b2c;border-radius:12px;background:#25170f;color:white;padding:12px;font-weight:800}
.toast{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:100;
  background:#1d130d;border:1px solid #efc45f66;border-radius:12px;padding:11px 16px;font-weight:800;transition:.2s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.topbar{display:none}
@media (orientation:portrait),(max-width:900px){
  html,body{overflow:auto}
  .app{
    height:auto;min-height:100dvh;display:grid;grid-template-columns:1fr;
    grid-template-rows:76px minmax(520px,calc(100dvh - 210px)) 118px;
    gap:8px;padding:8px;
  }
  .topbar{
    grid-column:1;grid-row:1;display:grid;grid-template-columns:repeat(7,1fr);gap:5px;
    background:linear-gradient(180deg,#1c120c,#100b08);border:1px solid #6c4b2c;border-radius:18px;padding:6px
  }
  .topbar .tool{min-height:60px;font-size:11px}
  .topbar .tool span{font-size:18px}
  .left,.right{display:none}
  .board-wrap{grid-column:1;grid-row:2}
  .player{grid-column:1;grid-row:3}
}
</style>
</head>
<body>
<div class="app">
  <nav class="topbar" id="topbar"></nav>

  <aside class="left">
    <div class="brand">AlphaTrader AI Pro V5<br><small>Build015 Ultimate Go Studio</small></div>
    <div class="card"><div class="player-name"><span><i class="stone-dot white"></i> 白方</span><b id="whiteName">AI</b></div></div>
    <div class="card"><div class="player-name"><span><i class="stone-dot black"></i> 黑方</span><b id="blackName">人類</b></div></div>
    <div class="stats">
      <div class="stat"><small>目前手數</small><b id="moveCount">0 / 0</b></div>
      <div class="stat"><small>最新落子</small><b id="lastCoord">—</b></div>
      <div class="stat"><small>棋盤</small><b id="boardSizeText">19路</b></div>
      <div class="stat"><small>狀態</small><b id="statusText">待命</b></div>
    </div>
  </aside>

  <main class="board-wrap"><canvas id="board"></canvas></main>

  <aside class="right" id="rightTools"></aside>

  <section class="player">
    <div class="controls">
      <button id="firstBtn">⏮</button>
      <button id="prevBtn">◀</button>
      <button id="playBtn" class="primary">▶</button>
      <button id="nextBtn">▶</button>
      <button id="lastBtn">⏭</button>
    </div>
    <div class="range-row"><input id="moveSlider" type="range" min="0" max="0" value="0"><span id="sliderText">0 / 0</span></div>
  </section>
</div>

<input id="sgfFile" type="file" accept=".sgf,application/x-go-sgf,text/plain" hidden>

<div id="infoModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="infoModal">✕</button><h2>資訊與棋譜</h2>
  <p>版本：20260712-2345</p>
  <div class="grid2">
    <button class="action" id="chooseSgfBtn">選擇 SGF</button>
    <button class="secondary" id="newGameBtn">空棋盤</button>
  </div>
  <p id="fileInfo">尚未載入棋譜。</p>
</div></div>

<div id="aiModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="aiModal">✕</button><h2>AI 分析</h2>
  <div class="card"><b>示範分析</b><p id="aiText">載入棋譜後可查看目前局面的示範評語。</p></div>
  <div class="grid2"><button class="action" id="bestMoveBtn">顯示最佳手</button><button class="secondary" id="explainBtn">AI 解說</button></div>
</div></div>

<div id="humanModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="humanModal">✕</button><h2>人機對弈</h2>
  <div class="grid2">
    <label>棋盤<select id="gameSize"><option>19</option><option>13</option><option>9</option></select></label>
    <label>人類執子<select id="humanColor"><option value="B">黑</option><option value="W">白</option></select></label>
    <label>基本時間（分鐘）<input id="mainTime" type="number" min="0" value="30"></label>
    <label>讀秒（秒）<input id="byoTime" type="number" min="0" value="30"></label>
    <label>讀秒次數<input id="byoCount" type="number" min="0" value="3"></label>
    <label>落子音<select id="soundOn"><option value="1">開</option><option value="0">關</option></select></label>
  </div>
  <button class="action" id="startHumanBtn" style="width:100%;margin-top:12px">開始新對局</button>
</div></div>

<div id="cloudModal" class="modal-backdrop"><div class="modal">
  <button class="close" data-close="cloudModal">✕</button><h2>KataGo Cloud</h2>
  <label>API 網址<input id="apiUrl" placeholder="https://你的-katago-server.example.com"></label>
  <label>API 金鑰<input id="apiKey" placeholder="API_KEY"></label>
  <div class="grid2" style="margin-top:12px"><button class="action" id="saveApiBtn">儲存設定</button><button class="secondary" id="testApiBtn">測試連線</button></div>
  <p id="cloudStatus">尚未連線。</p>
</div></div>

<div id="toast" class="toast"></div>

<script>
"use strict";
const APP_VERSION="20260712-2345";

const $=id=>document.getElementById(id);
const state={
  size:19,moves:[],index:0,playing:false,timer:null,fileName:"",
  humanMode:false,humanColor:"B",turn:"B",sound:true,bestPoint:null
};

function toast(msg){
  const el=$("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1500);
}
function openModal(id){$(id).classList.add("open")}
function closeModal(id){$(id).classList.remove("open")}

const tools=[
  ["infoBtn","☰","資訊",()=>openModal("infoModal")],
  ["teachBtn","▣","教學",()=>toast("教學模式已啟動")],
  ["aiBtn","AI","AI分析",()=>openModal("aiModal")],
  ["humanBtn","♟","人機",()=>openModal("humanModal")],
  ["cloudBtn","◉","KataGo",()=>openModal("cloudModal")],
  ["zoomBtn","⛶","放大",()=>toggleFullscreen()],
  ["resetBtn","↺","還原",()=>resetView()]
];
function buildTools(container){
  container.innerHTML="";
  tools.forEach(([id,icon,label,fn])=>{
    const b=document.createElement("button"); b.id=id+"_"+container.id; b.className="tool";
    b.innerHTML=`<span>${icon}</span><small>${label}</small>`;
    b.addEventListener("click",fn); container.appendChild(b);
  });
}
buildTools($("rightTools")); buildTools($("topbar"));

function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else{ document.exitFullscreen?.(); }
}
function resetView(){
  document.querySelectorAll(".modal-backdrop.open").forEach(x=>x.classList.remove("open"));
  resizeBoard(); drawBoard(); toast("已還原正常版面");
}

function parseSGF(text){
  const size=Number((text.match(/SZ\[(\d+)\]/)||[])[1]||19);
  const pb=(text.match(/PB\[([^\]]*)\]/)||[])[1]||"黑方";
  const pw=(text.match(/PW\[([^\]]*)\]/)||[])[1]||"白方";
  const moves=[];
  const re=/;([BW])\[([a-z]{0,2})\]/g; let m;
  while((m=re.exec(text))){
    if(!m[2]){moves.push({c:m[1],pass:true});continue}
    moves.push({c:m[1],x:m[2].charCodeAt(0)-97,y:m[2].charCodeAt(1)-97});
  }
  return {size,pb,pw,moves};
}
function loadSGFText(text,name){
  const g=parseSGF(text);
  state.size=g.size; state.moves=g.moves; state.index=0; state.fileName=name||"SGF";
  state.humanMode=false; state.bestPoint=null;
  $("blackName").textContent=g.pb; $("whiteName").textContent=g.pw;
  $("fileInfo").textContent=`已載入：${state.fileName}｜${g.size}路｜${g.moves.length}手`;
  syncUI(); resizeBoard(); drawBoard(); toast("棋譜載入成功");
}

const canvas=$("board"),ctx=canvas.getContext("2d");
function resizeBoard(){
  const parent=canvas.parentElement.getBoundingClientRect();
  const css=Math.max(280,Math.floor(Math.min(parent.width-16,parent.height-16)));
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.style.width=css+"px";canvas.style.height=css+"px";
  canvas.width=Math.floor(css*dpr);canvas.height=Math.floor(css*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function positionAtMove(n){
  const board=Array.from({length:state.size},()=>Array(state.size).fill(null));
  for(let i=0;i<n;i++){
    const mv=state.moves[i]; if(!mv||mv.pass)continue;
    if(mv.x>=0&&mv.y>=0&&mv.x<state.size&&mv.y<state.size)board[mv.y][mv.x]=mv.c;
  }
  return board;
}
function coordLabel(x,y){
  const letters="ABCDEFGHJKLMNOPQRST";
  return (letters[x]||"?")+(state.size-y);
}
function drawBoard(){
  const css=canvas.getBoundingClientRect().width;
  if(!css)return;
  const pad=css*0.055, boardPx=css-pad*2, step=boardPx/(state.size-1);
  const grad=ctx.createLinearGradient(0,0,css,css);
  grad.addColorStop(0,"#f2c46d");grad.addColorStop(1,"#c98231");
  ctx.clearRect(0,0,css,css);ctx.fillStyle=grad;ctx.fillRect(0,0,css,css);
  ctx.strokeStyle="#51351e";ctx.lineWidth=Math.max(1,css/900);
  for(let i=0;i<state.size;i++){
    const p=pad+i*step;
    ctx.beginPath();ctx.moveTo(pad,p);ctx.lineTo(css-pad,p);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p,pad);ctx.lineTo(p,css-pad);ctx.stroke();
  }
  const stars=state.size===19?[3,9,15]:state.size===13?[3,6,9]:[2,4,6];
  ctx.fillStyle="#51351e";
  stars.forEach(y=>stars.forEach(x=>{ctx.beginPath();ctx.arc(pad+x*step,pad+y*step,Math.max(2,step*.07),0,Math.PI*2);ctx.fill()}));
  const board=positionAtMove(state.index);
  const start=Math.max(0,state.index-30);
  for(let y=0;y<state.size;y++)for(let x=0;x<state.size;x++){
    const c=board[y][x]; if(!c)continue;
    const cx=pad+x*step,cy=pad+y*step,r=step*.43;
    const g=ctx.createRadialGradient(cx-r*.25,cy-r*.3,r*.08,cx,cy,r);
    if(c==="B"){g.addColorStop(0,"#4a4a4a");g.addColorStop(.35,"#161616");g.addColorStop(1,"#000")}
    else{g.addColorStop(0,"#fff");g.addColorStop(.55,"#eee");g.addColorStop(1,"#bbb")}
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    const idx=state.moves.findIndex((m,i)=>i<state.index&&!m.pass&&m.x===x&&m.y===y&&positionAtMove(i+1)[y][x]===c);
    let latest=-1; for(let i=state.index-1;i>=0;i--){const m=state.moves[i];if(m&&!m.pass&&m.x===x&&m.y===y){latest=i;break}}
    if(latest>=start){
      ctx.fillStyle=c==="B"?"#fff":"#222";ctx.font=`${Math.max(10,step*.32)}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(latest+1),cx,cy);
    }
    if(latest===state.index-1){
      ctx.strokeStyle="#ff5148";ctx.lineWidth=Math.max(2,step*.07);ctx.beginPath();ctx.arc(cx,cy,r*.78,0,Math.PI*2);ctx.stroke();
    }
  }
  if(state.bestPoint){
    const cx=pad+state.bestPoint.x*step,cy=pad+state.bestPoint.y*step;
    ctx.strokeStyle="#38ff85";ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,step*.34,0,Math.PI*2);ctx.stroke();
  }
}
function syncUI(){
  $("moveSlider").max=state.moves.length;$("moveSlider").value=state.index;
  $("sliderText").textContent=`${state.index} / ${state.moves.length}`;
  $("moveCount").textContent=`${state.index} / ${state.moves.length}`;
  $("boardSizeText").textContent=`${state.size}路`;
  const mv=state.moves[state.index-1];
  $("lastCoord").textContent=mv&&!mv.pass?coordLabel(mv.x,mv.y):"—";
  $("statusText").textContent=state.humanMode?"對弈中":"待命";
  drawBoard();
}
function goTo(n){state.index=Math.max(0,Math.min(state.moves.length,n));syncUI()}
function togglePlay(){
  state.playing=!state.playing;$("playBtn").textContent=state.playing?"⏸":"▶";
  clearInterval(state.timer);
  if(state.playing)state.timer=setInterval(()=>{if(state.index>=state.moves.length){togglePlay();return}goTo(state.index+1)},700);
}

$("firstBtn").onclick=()=>goTo(0);
$("prevBtn").onclick=()=>goTo(state.index-1);
$("playBtn").onclick=togglePlay;
$("nextBtn").onclick=()=>goTo(state.index+1);
$("lastBtn").onclick=()=>goTo(state.moves.length);
$("moveSlider").oninput=e=>goTo(Number(e.target.value));

document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
document.querySelectorAll(".modal-backdrop").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)closeModal(m.id)}));

$("chooseSgfBtn").onclick=()=>$("sgfFile").click();
$("sgfFile").onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  loadSGFText(await f.text(),f.name);e.target.value="";
};
$("newGameBtn").onclick=()=>{
  state.size=19;state.moves=[];state.index=0;state.fileName="";state.humanMode=false;
  $("blackName").textContent="人類";$("whiteName").textContent="AI";$("fileInfo").textContent="空棋盤";
  syncUI();closeModal("infoModal");toast("已建立空棋盤");
};
$("bestMoveBtn").onclick=()=>{
  state.bestPoint={x:Math.floor(state.size/2),y:Math.floor(state.size/2)};
  drawBoard();toast("已顯示示範推薦點");
};
$("explainBtn").onclick=()=>{
  $("aiText").textContent=state.index?"朱老師 AI 建議：先處理弱棋，再考慮全局大場。":"請先載入棋譜或開始對局。";
};
$("startHumanBtn").onclick=()=>{
  state.size=Number($("gameSize").value);state.moves=[];state.index=0;state.humanMode=true;state.humanColor=$("humanColor").value;state.turn="B";
  state.sound=$("soundOn").value==="1";$("blackName").textContent=state.humanColor==="B"?"人類":"AI";$("whiteName").textContent=state.humanColor==="W"?"人類":"AI";
  syncUI();closeModal("humanModal");toast("人機對弈已開始");
};
canvas.addEventListener("click",e=>{
  if(!state.humanMode)return;
  const rect=canvas.getBoundingClientRect(),css=rect.width,pad=css*.055,step=(css-pad*2)/(state.size-1);
  const x=Math.round((e.clientX-rect.left-pad)/step),y=Math.round((e.clientY-rect.top-pad)/step);
  if(x<0||y<0||x>=state.size||y>=state.size)return;
  if(positionAtMove(state.index)[y][x])return;
  state.moves=state.moves.slice(0,state.index);state.moves.push({c:state.turn,x,y});state.index++;
  state.turn=state.turn==="B"?"W":"B";syncUI();
  if(state.sound){try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.frequency.value=260;g.gain.value=.08;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.05)}catch(_){}}
  if(state.turn!==state.humanColor){
    setTimeout(()=>{
      const board=positionAtMove(state.index);let pts=[];
      for(let yy=0;yy<state.size;yy++)for(let xx=0;xx<state.size;xx++)if(!board[yy][xx])pts.push([xx,yy]);
      if(pts.length){const [ax,ay]=pts[Math.floor(Math.random()*pts.length)];state.moves.push({c:state.turn,x:ax,y:ay});state.index++;state.turn=state.turn==="B"?"W":"B";syncUI()}
    },350);
  }
});
$("saveApiBtn").onclick=()=>{
  localStorage.setItem("katagoApiUrl",$("apiUrl").value);localStorage.setItem("katagoApiKey",$("apiKey").value);toast("KataGo 設定已儲存");
};
$("testApiBtn").onclick=()=>{$("cloudStatus").textContent=$("apiUrl").value?"已儲存網址；需部署後端才能真正連線。":"請先填入 API 網址。"};
$("apiUrl").value=localStorage.getItem("katagoApiUrl")||"";
$("apiKey").value=localStorage.getItem("katagoApiKey")||"";

window.addEventListener("resize",()=>{clearTimeout(window._rz);window._rz=setTimeout(()=>{resizeBoard();drawBoard()},120)});
window.addEventListener("orientationchange",()=>setTimeout(()=>{resizeBoard();drawBoard()},250));

resizeBoard();syncUI();toast("Build015 已啟動");
</script>
</body>
</html>
